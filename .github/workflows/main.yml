name: Build Kivy Android App 🐍

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. تحرير مساحة في قرص GitHub (لأن بناء Kivy يستهلك مساحة ضخمة)
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # 2. تثبيت متطلبات Buildozer
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good
          
    # 3. تثبيت Buildozer
    - name: Install Buildozer
      run: pip3 install --upgrade buildozer cython==0.29.36

    # 4. بدء البناء (هذه الخطوة تأخذ وقتاً طويلاً: 15-20 دقيقة)
    - name: Build APK with Buildozer
      run: buildozer android debug

    # 5. رفع الملف الناتج
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudPatcher-Kivy
        path: bin/*.apk
