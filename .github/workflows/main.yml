name: Build Android Without Studio 🛠️

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # يسمح لك بتشغيل البناء يدوياً بزر Run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب الكود
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. إعداد الجافا
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. إعداد Gradle (هذه الخطوة السحرية تحل محل Android Studio)
    # ستقوم بتثبيت Gradle 8.4 المتوافق مع الكود أعلاه
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 4. بناء ملف APK
    # نستخدم أمر gradle مباشرة بدلاً من ./gradlew
    - name: Build APK
      run: gradle assembleDebug --stacktrace

    # 5. رفع الملف الناتج
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudPatcher-App
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
