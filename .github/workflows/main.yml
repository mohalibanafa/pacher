name: Build Kivy Android App 🐍

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. تحرير مساحة في قرص GitHub (لأن بناء Kivy يستهلك مساحة ضخمة)
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # 2. تثبيت متطلبات Buildozer و Kivy و Android SDK
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0 \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          openjdk-17-jdk \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo6 \
          cmake \
          libffi-dev \
          libssl-dev \
          libbz2-dev
          
    # 3. تثبيت Buildozer
    - name: Install Buildozer
      run: pip3 install --upgrade buildozer cython==0.29.36

    # 3.1 تثبيت أدوات بناء أندرويد بشكل صحيح
    - name: Install Android Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget
        export ANDROID_HOME=$HOME/.android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        
        # تحميل وتثبيت cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        
        # إعداد متغيرات البيئة لـ GitHub Actions لتكون متاحة في الخطوات القادمة
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        
        # قبول التراخيص وتثبيت المكونات الضرورية
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
          "platform-tools" "build-tools;33.0.0" "platforms;android-33"

    # 4. بدء البناء (هذه الخطوة تأخذ وقتاً طويلاً: 15-20 دقيقة)
    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug

    # 5. رفع الملف الناتج
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudPatcher-Kivy
        path: bin/*.apk
